services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: macrosphere-api
    runtime: python
    rootDir: backend
    buildCommand: pip install poetry && poetry install --no-interaction --no-ansi
    startCommand: poetry run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./macrosphere.db
      - key: API_ENV
        value: production
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["*"]'
      # Set your OpenAI key in the Render dashboard → Environment
      - key: OPENAI_API_KEY
        sync: false

  # ── Frontend ─────────────────────────────────────────────────
  - type: web
    name: macrosphere-web
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      # Dynamically wired to the backend service's public hostname
      - key: BACKEND_URL
        fromService:
          type: web
          name: macrosphere-api
          property: host
